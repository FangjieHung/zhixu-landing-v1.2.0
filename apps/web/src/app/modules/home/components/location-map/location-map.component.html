<section #section class="lm-section">
  <div #stage class="lm-stage">


    <svg
      #map
      class="lm-map"
      viewBox="0 0 1831 1013"
      preserveAspectRatio="xMidYMid slice"
      role="img"
      aria-label="之序 · 周邊位置示意圖"
    >
      <!-- Base map illustration — assets/image/map/map-bg.svg -->
      <image
        href="assets/image/map/map-bg.svg"
        x="0"
        y="0"
        width="1831"
        height="1013"
        preserveAspectRatio="xMidYMid meet"
      />

      <!-- ── Phase 2: routes (drawn behind POIs) ──────────────────────── -->
      <g class="lm-routes-phase2">
        <path
          *ngFor="let r of routes; trackBy: routesTrack"
          class="lm-route-path"
          [attr.data-id]="r.id"
          [attr.d]="r.d"
          [attr.stroke]="r.stroke"
          [attr.stroke-width]="r.width"
          fill="none"
          stroke-linecap="round"
          stroke-linejoin="round"
          stroke-opacity="0.92"
        />
        <text
          *ngFor="let r of routes; trackBy: routesTrack"
          class="lm-route-label"
          [attr.data-id]="r.id"
          [attr.x]="r.labelX"
          [attr.y]="r.labelY"
          [attr.text-anchor]="r.labelAnchor"
          [attr.fill]="r.stroke"
          font-family="Noto Serif SC, serif"
          font-size="15"
          font-weight="600"
          letter-spacing="0.06em"
        >{{ r.label }}</text>
      </g>

      <!-- ── Phase 2: background silhouette marks ─────────────────────── -->
      <g class="lm-bg-marks">
        <g
          *ngFor="let m of bgMarks; let i = index; trackBy: bgMarksTrack"
          class="lm-bg-mark"
          [attr.data-i]="i"
          [attr.transform]="'translate(' + m.x + ',' + m.y + ')'"
        >
          <circle r="6" fill="#a89d8c" />
          <text
            x="0"
            y="-14"
            text-anchor="middle"
            font-family="Noto Serif SC, serif"
            font-size="14"
            font-weight="500"
            fill="#a89d8c"
            letter-spacing="0.06em"
          >{{ m.name }}</text>
        </g>
      </g>

      <!-- ── Phase 1: near POI markers ────────────────────────────────── -->
      <g class="lm-pois">
        <g
          *ngFor="let p of pois; let i = index; trackBy: poisTrack"
          class="lm-poi"
          [attr.data-i]="i"
          [attr.transform]="'translate(' + p.x + ',' + p.y + ')'"
        >
          <circle r="22" fill="#2f3a26" />
          <text
            text-anchor="middle"
            dominant-baseline="central"
            font-family="Playfair Display, serif"
            font-size="16"
            fill="#f0e6d0"
            font-weight="500"
          >{{ p.min }}</text>
        </g>

        <g
          *ngFor="let p of pois; let i = index; trackBy: poisTrack"
          class="lm-poi"
          [attr.data-i]="i"
        >
          <text
            [attr.x]="poiLabelX(p)"
            [attr.y]="poiLabelTopY(p)"
            [attr.text-anchor]="p.anchor === 'end' ? 'end' : 'start'"
            font-family="Montserrat, sans-serif"
            font-size="9"
            letter-spacing="2.4"
            fill="#c9b88a"
            font-weight="600"
          >MINUTES BY CAR</text>
          <text
            [attr.x]="poiLabelX(p)"
            [attr.y]="poiLabelBottomY(p)"
            [attr.text-anchor]="p.anchor === 'end' ? 'end' : 'start'"
            font-family="Noto Serif SC, serif"
            font-size="17"
            fill="#ece4d3"
            font-weight="500"
          >{{ p.name }}</text>
        </g>
      </g>

      <!-- ── Phase 2: far POI markers ─────────────────────────────────── -->
      <g class="lm-far-pois">
        <g
          *ngFor="let p of farPois; let i = index; trackBy: poisTrack"
          class="lm-far-poi"
          [attr.data-i]="i"
          [attr.transform]="'translate(' + p.x + ',' + p.y + ')'"
        >
          <circle r="22" fill="#2f3a26" />
          <text
            text-anchor="middle"
            dominant-baseline="central"
            font-family="Playfair Display, serif"
            font-size="16"
            fill="#f0e6d0"
            font-weight="500"
          >{{ p.min }}</text>
        </g>

        <g
          *ngFor="let p of farPois; let i = index; trackBy: poisTrack"
          class="lm-far-poi"
          [attr.data-i]="i"
        >
          <text
            [attr.x]="poiLabelX(p)"
            [attr.y]="poiLabelTopY(p)"
            [attr.text-anchor]="p.anchor === 'end' ? 'end' : 'start'"
            font-family="Montserrat, sans-serif"
            font-size="9"
            letter-spacing="2.4"
            fill="#c9b88a"
            font-weight="600"
          >MINUTES BY CAR</text>
          <text
            [attr.x]="poiLabelX(p)"
            [attr.y]="poiLabelBottomY(p)"
            [attr.text-anchor]="p.anchor === 'end' ? 'end' : 'start'"
            font-family="Noto Serif SC, serif"
            font-size="17"
            fill="#ece4d3"
            font-weight="500"
          >{{ p.name }}</text>
        </g>
      </g>

      <!-- Center pin · 之序 -->
      <g class="lm-pin" transform="translate(915, 506)">
        <circle class="pin-pulse" r="34" fill="#2f3a26" opacity="0.55" />
        <circle r="34" fill="#2f3a26" />
        <!-- Simple tower glyph -->
        <g transform="translate(-9, -16)" fill="#f0e6d0">
          <rect x="6" y="0" width="6" height="22" rx="0.5" />
          <rect x="0" y="6" width="4" height="16" rx="0.5" />
          <rect x="14" y="6" width="4" height="16" rx="0.5" />
          <rect x="7" y="-4" width="4" height="4" />
        </g>
        <text
          x="0"
          y="22"
          text-anchor="middle"
          font-family="Playfair Display, serif"
          font-style="italic"
          font-size="11"
          fill="#f0e6d0"
          letter-spacing="0.8"
        >之序</text>
      </g>
    </svg>

    <div class="lm-caption lm-caption-near">
      <div class="lm-cap-eyebrow">{{ captionNear.eyebrow }}</div>
      <div class="lm-cap-line">
        {{ captionNear.line1 }}<br />
        {{ captionNear.line2 }}
      </div>
    </div>
    <div class="lm-caption lm-caption-far">
      <div class="lm-cap-eyebrow">{{ captionFar.eyebrow }}</div>
      <div class="lm-cap-line">
        {{ captionFar.line1 }}<br />
        {{ captionFar.line2 }}
      </div>
    </div>
  </div>
</section>
