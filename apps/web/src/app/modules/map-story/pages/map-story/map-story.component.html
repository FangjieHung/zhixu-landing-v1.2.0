<section class="story-wrapper">

  <div class="spacer"></div>

  <section class="map-section">

    <div class="map-container" #mapContainer>

      <svg
        #svgMap
        class="map-svg"
        viewBox="0 0 1920 1080"
      >

        <!-- 背景 -->
        <rect width="1920" height="1080" fill="#111111" />

        <!-- 地圖裝飾 -->
        <g opacity="0.25">

          <path
            d="M0 500 C400 300 700 700 1200 500"
            stroke="#333"
            stroke-width="2"
            fill="none"
          />

          <path
            d="M200 200 C600 400 1000 100 1600 300"
            stroke="#333"
            stroke-width="2"
            fill="none"
          />

        </g>

        <!-- 主路徑底線 -->
        <path
          #basePath
          class="route-base"
          d="
            M200 700
            C400 650 500 500 700 450
            S1100 300 1400 350
            S1700 500 1750 250
          "
        />

        <!-- 發光路徑 -->
        <path
          #glowPath
          class="route-glow"
          d="
            M200 700
            C400 650 500 500 700 450
            S1100 300 1400 350
            S1700 500 1750 250
          "
        />

        <!-- moving dot -->
        <circle
          #movingDot
          r="12"
          fill="white"
          class="moving-dot"
        />

      </svg>

      <!-- title -->
      <div class="map-title">
        SPRINGS
      </div>

    </div>

  </section>

  <div class="spacer"></div>

</section>
