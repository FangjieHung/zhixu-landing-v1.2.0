<ul>
  <li matRipple class="upload-img card card_lower" *ngIf="!previewSrc">
    <input id="upload-file" type="file" accept="image/*" (change)="onUploadFile($event.target)" class="hidden" />
    <label matRipple for="upload-file"
      class="flex items-center flex-col justify-center w-full text-center border-4 border-dashed border-gray-300 rounded-lg py-6 my-2 text-gray-400">
      <i class="material-icons-outlined w-36 text-6xl">cloud_upload</i>
      <p class="font-medium text-lg">請選擇圖片檔案</p>
    </label>
  </li>
  <li class="card-basic mb-6" *ngIf="previewSrc">
    <article tabindex="0"
      class="group w-full h-full rounded-md focus:outline-none focus:shadow-outline elative bg-gray-100 relative shadow-sm">
      <img alt="upload preview" class="img-preview w-full h-full sticky object-cover rounded-md bg-fixed"
        [src]="previewSrc | safeUrl" [style.max-height]="maxImgHeight ? maxImgHeight : null" />
      <section class="flex flex-col rounded-md text-xs break-words w-full h-full z-20 absolute top-0 py-2 px-3">
        <h1 class="flex-1 group-hover:text-blue-800"></h1>
        <div class="flex">
          <p class="p-1 size text-xs text-gray-700"></p>
          <div class="delete ml-auto focus:outline-none hover:bg-gray-300 p-1 rounded-md text-gray-800">
            <button (click)="onDelAppFileAtt()">
              <svg class="pointer-events-none fill-current w-4 h-4 ml-auto text-red-500"
                xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24">
                <path class="pointer-events-none"
                  d="M3 6l3 18h12l3-18h-18zm19-4v2h-20v-2h5.711c.9 0 1.631-1.099 1.631-2h5.316c0 .901.73 2 1.631 2h5.711z" />
              </svg>
            </button>
          </div>
        </div>
      </section>
    </article>
  </li>
</ul>
