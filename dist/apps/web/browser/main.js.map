<swiper [config]="swiperConfig">
  <ng-template swiperSlide *ngFor="let partner of partners">
    <div class="">
      <img [src]="partner.logo" [alt]="partner.name" class="w-full max-w-72 aspect-video object-contain mx-auto">
      <p>{{ partner.description }}</p>
    </div>
  </ng-template>
</swiper>
