
    <div class="md:flex items-start justify-center">
        <svg version="1.1" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 160">
            <circle class="path circle" fill="none" stroke="var(--md-sys-color-error)" stroke-width="10"
                stroke-miterlimit="10" cx="80" cy="80" r="70" />
            <line class="path x-line-1" x1="55" y1="55" x2="105" y2="105" stroke="var(--md-sys-color-error)" stroke-width="10"
                stroke-linecap="round" stroke-miterlimit="10" />
            <line class="path x-line-2" x1="105" y1="55" x2="55" y2="105" stroke="var(--md-sys-color-error)" stroke-width="10"
                stroke-linecap="round" stroke-miterlimit="10" />
        </svg>
        <div class="fade-in-left">
            <h1 class="fail-title">{{ message }}</h1>
        </div>
    </div>
